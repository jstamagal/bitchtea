name: Doc Lint

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/doclint.sh'
      - '.github/workflows/doc-lint.yml'
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'scripts/doclint.sh'
      - '.github/workflows/doc-lint.yml'

jobs:
  doclint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run doc-lint
        run: bash scripts/doclint.sh
